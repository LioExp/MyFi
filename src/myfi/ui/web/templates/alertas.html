<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFi — Alertas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">
  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" aria-label="Alternar menu" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-logo" onclick="window.location='/'">
        <div class="logo-icon">
          <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="MyFi Logo">
        </div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="online-badge">
        <span class="status-dot-wrap"><span class="status-ping"></span><span class="status-dot"></span></span>
        Online
      </div>
      <button class="icon-btn" aria-label="Notificações">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot"></span>
      </button>
    </div>
  </header>

  <div class="body-wrap">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <nav>
        <span class="sidebar-label">Navegação</span>
        <a href="/" class="nav-item">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="/dispositivos" class="nav-item">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
          <span class="nav-label">Dispositivos</span>
        </a>
        <a href="/alertas" class="nav-item active">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
          <span class="nav-label">Alertas</span>
        </a>
        <a href="/automacao" class="nav-item">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
          <span class="nav-label">Automação</span>
        </a>
        <a href="/ia" class="nav-item">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 1 6 6c0 3-2 5-2 5H8s-2-2-2-5a6 6 0 0 1 6-6z"/><path d="M8 14s-.5 1-.5 2.5c0 1.5 1 2.5 4.5 2.5s4.5-1 4.5-2.5c0-1.5-.5-2.5-.5-2.5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg></span>
          <span class="nav-label">IA</span>
        </a>
        <a href="/configuracoes" class="nav-item">
          <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
          <span class="nav-label">Configurações</span>
        </a>
      </nav>
      <div class="sidebar-promo">
        <div class="promo-header">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 1 6 6c0 3-2 5-2 5H8s-2-2-2-5a6 6 0 0 1 6-6z"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/></svg>
          <span class="promo-title">MyFi IA</span>
        </div>
        <p class="promo-text">Otimize sua rede com sugestões automáticas.</p>
      </div>
    </aside>

    <!-- MAIN -->
    <main>
      <div class="page-inner">
        <!-- Header -->
        <div class="page-header">
          <div>
            <h1 class="page-title">Alertas e Notificações</h1>
            <p class="page-sub" id="alert-summary">Carregando...</p>
          </div>
          <div class="header-actions">
            <button class="btn" onclick="markAllRead()">Marcar todos como lidos</button>
            <button class="btn btn-primary" onclick="window.location='/configuracoes'">Configurar regras</button>
          </div>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
          <span class="filter active" onclick="filterAlerts('todos', this)">Todos</span>
          <span class="filter" onclick="filterAlerts('nao-lidos', this)">Não lidos</span>
          <span class="filter" onclick="filterAlerts('7dias', this)">Últimos 7 dias</span>
          <span class="filter" onclick="filterAlerts('criticos', this)">Apenas críticos</span>
        </div>

        <!-- Alert List -->
        <div class="alert-list" id="alertList"></div>
      </div>
    </main>

    <!-- Side Panel -->
    <aside class="sidepanel" id="sidePanel">
      <h4>Resumo rápido</h4>
      <p id="side-alerts-today">Alertas hoje: --</p>
      <p id="side-critical">Críticos: --</p>
      <div class="mini-chart" id="miniChart"></div>
    </aside>
  </div>
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
<script>
  // ============== SIDEBAR PERSISTENCE ==============
  if (localStorage.getItem('sidebar-collapsed') === 'true') {
    document.getElementById('sidebar').classList.add('collapsed');
  }
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    sidebar.classList.toggle('collapsed');
    localStorage.setItem('sidebar-collapsed', sidebar.classList.contains('collapsed'));
  }

  // ============== ALERTS ==============
  const alertIcons = {
    critical: `<svg viewBox="0 0 24 24" fill="none" stroke="hsl(358,78%,72%)" stroke-width="2" style="width:20px;height:20px"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    warning: `<svg viewBox="0 0 24 24" fill="none" stroke="hsl(38,92%,65%)" stroke-width="2" style="width:20px;height:20px"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
    info: `<svg viewBox="0 0 24 24" fill="none" stroke="hsl(210,80%,72%)" stroke-width="2" style="width:20px;height:20px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`
  };

  const alertBadgeStyle = {
    critical: 'background:hsla(358,78%,62%,0.1);color:hsl(358,78%,72%);border:1px solid hsla(358,78%,62%,0.25)',
    warning: 'background:hsla(38,92%,58%,0.1);color:hsl(38,92%,65%);border:1px solid hsla(38,92%,58%,0.25)',
    info: 'background:hsla(210,80%,65%,0.1);color:hsl(210,80%,72%);border:1px solid hsla(210,80%,65%,0.25)'
  };

  const alertBadgeLabels = {critical: 'Crítico', warning: 'Aviso', info: 'Info'};

  const alertsData = [
    { id:1, type:'critical', title:'Limite de Consumo Excedido', device:'Laptop-Lio', ip:'192.168.0.105', desc:'Limite excedido acima de 85%', time:'Hoje, 14:32', read:false },
    { id:2, type:'warning', title:'Pico de Tráfego Anormal', device:'iPhone-Lio', ip:'192.168.0.112', desc:'Pico de tráfego anormal detectado', time:'Hoje, 03:47', read:false },
    { id:3, type:'info', title:'Novo Dispositivo Conectado', device:'TV-Sala', ip:'192.168.0.115', desc:'Novo dispositivo conectado à rede', time:'Ontem, 21:15', read:true },
  ];

  let currentFilter = 'todos';

  function renderAlerts() {
    const filtered = alertsData.filter(a => {
      if (currentFilter === 'nao-lidos') return !a.read;
      if (currentFilter === 'criticos') return a.type === 'critical';
      return true;
    });

    const container = document.getElementById('alertList');
    container.innerHTML = filtered.map(a => `
      <div class="alert-card ${a.type}">
        <div class="alert-left">
          <div class="alert-icon">${alertIcons[a.type]}</div>
          <div class="alert-content">
            <strong>${a.title} <span class="badge" style="${alertBadgeStyle[a.type]}">${alertBadgeLabels[a.type]}</span></strong>
            <p><b>${a.device}</b> (IP: ${a.ip})</p>
            <p>${a.desc}</p>
          </div>
        </div>
        <div class="alert-right">
          ${a.time}
          <div class="alert-actions">
            <span class="link" onclick="alert('Detalhes do alerta ${a.id}')">Ver detalhes</span>
            <span class="link" style="color:var(--muted-fg)" onclick="dismissAlert(${a.id})">Ignorar</span>
          </div>
        </div>
      </div>
    `).join('');

    // Update summary
    document.getElementById('alert-summary').textContent = `${filtered.length} alerta(s) encontrado(s)`;
    document.getElementById('side-alerts-today').textContent = `Alertas hoje: ${alertsData.length}`;
    document.getElementById('side-critical').textContent = `Críticos: ${alertsData.filter(a=>a.type==='critical').length}`;

    // Mini chart
    const chart = document.getElementById('miniChart');
    chart.innerHTML = alertsData.map(a => {
      const h = a.type === 'critical' ? 80 : a.type === 'warning' ? 50 : 30;
      return `<div class="bar ${a.type === 'critical' ? 'red' : ''}" style="height:${h}%"></div>`;
    }).join('');
  }

  function filterAlerts(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
    el.classList.add('active');
    renderAlerts();
  }

  function markAllRead() {
    alertsData.forEach(a => a.read = true);
    renderAlerts();
  }

  function dismissAlert(id) {
    const idx = alertsData.findIndex(a => a.id === id);
    if (idx > -1) alertsData.splice(idx, 1);
    renderAlerts();
  }

  // Init
  renderAlerts();
</script>
</body>
</html>
